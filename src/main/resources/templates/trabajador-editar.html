<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Trabajador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div>
        <a th:href="@{/trabajadores}" class="btn btn-outline-light btn-sm">
            Volver a Trabajadores
        </a>
    </div>
</nav>


<div class="container mt-4">

    <div class="card mx-auto" style="max-width:600px;">

        <div class="card-header bg-warning text-dark">
            Editar Trabajador
        </div>

        <div class="card-body">

            <form th:action="@{/trabajadores/actualizar/{id}(id=${trabajador.id})}" th:object="${trabajador}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Puesto</label>
                    <input type="text" class="form-control" th:field="*{puesto}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Hora Entrada</label>
                    <input type="text" class="form-control" th:field="*{horaEntrada}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Hora Salida</label>
                    <input type="text" class="form-control" th:field="*{horaSalida}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Activo</label>
                    <input type="text" class="form-control" th:field="*{activo}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Vacaciones</label>
                    <input type="text" class="form-control" th:field="*{deVacaciones}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Libranza</label>
                    <input type="text" class="form-control" th:field="*{deLibranza}">
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Guardar Cambios
                </button>

            </form>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
