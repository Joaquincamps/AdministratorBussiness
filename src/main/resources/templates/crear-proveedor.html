<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Proveedor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body style="background-color:#f5f6fa;">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">
        <i class="bi bi-speedometer2"></i> Panel Administrador
    </span>

    <div>
        <a th:href="@{/proveedores}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Volver a Proveedores
        </a>
    </div>
</nav>


<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:600px; border-radius:10px;">

        <div class="card-header bg-primary text-white text-center">
            <h5 class="mb-0">
                <i class="bi bi-person-plus"></i> Crear Nuevo Proveedor
            </h5>
        </div>

        <div class="card-body p-4">

            <form th:action="@{/proveedores/nuevo}" method="post" th:object="${proveedor}">

                <div class="mb-4">
                    <label class="form-label fw-semibold">Nombre Empresa</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="Introduce el nombre de la empresa">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Nombre Contacto</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{contacto}"
                           placeholder="Introduce el nombre de la empresa">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           placeholder="cliente@email.com">
                </div>


                <div class="mb-4">
                    <label class="form-label fw-semibold">Teléfono</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{telefono}"
                           placeholder="+34 600 123 456">
                </div>


                <button type="submit" class="btn btn-success w-100 py-2">
                    <i class="bi bi-save"></i> Guardar Proveedor
                </button>

            </form>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
