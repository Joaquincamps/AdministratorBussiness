<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Proveedores</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div class="d-flex gap-2">
        <a th:href="@{/clientes}" class="btn btn-outline-light btn-sm">Clientes</a>
        <a th:href="@{/trabajadores}" class="btn btn-outline-light btn-sm">Trabajadores</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- MENSAJES -->
    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- CABECERA -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Gestión de Proveedores</h2>

        <div class="d-flex gap-2">

            <a th:href="@{/proveedores/nuevo}" class="btn btn-primary">
                <i class="bi bi-building"></i> Nuevo proveedor
            </a>

            <form th:action="@{/proveedores/importar}" method="post" enctype="multipart/form-data" class="d-flex gap-2">
                <input type="file" name="file" class="form-control form-control-sm">
                <button class="btn btn-success btn-sm">
                    <i class="bi bi-upload"></i> Importar CSV
                </button>
            </form>

        </div>

    </div>

    <!-- BUSCADOR -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body">

            <form th:action="@{/proveedores/buscar}" method="get" class="d-flex gap-2">

                <input type="text"
                       name="entrada"
                       class="form-control"
                       placeholder="🔍 Buscar proveedor por nombre, email o teléfono">

                <button class="btn btn-dark">
                    <i class="bi bi-search"></i>
                </button>

            </form>

        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Empresa</th>
                        <th>Contacto</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="proveedor : ${proveedores}">

                        <td th:text="${proveedor.id}"></td>

                        <td th:text="${proveedor.nombreEmpresa}"></td>

                        <td th:text="${proveedor.personaContacto}"></td>

                        <td th:text="${proveedor.telefono}"></td>

                        <td th:text="${proveedor.email}"></td>

                        <!-- ESTADO -->
                        <td>
                            <span th:if="${proveedor.activo}" class="badge bg-success">
                                🟢 Activo
                            </span>

                            <span th:unless="${proveedor.activo}" class="badge bg-danger">
                                🔴 Inactivo
                            </span>
                        </td>

                        <!-- ACCIONES -->
                        <td class="text-center">

                            <div class="d-flex justify-content-center gap-2">

                                <!-- EMAIL -->
                                <a th:href="@{/proveedores/email/{id}(id=${proveedor.id})}"
                                   class="btn btn-info btn-sm">
                                   📧
                                </a>

                                <!-- HISTORIAL -->
                                <a th:href="@{/proveedores/historial/{id}(id=${proveedor.id})}"
                                   class="btn btn-secondary btn-sm">
                                   📜
                                </a>

                                <!-- EDITAR -->
                                <a th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}"
                                   class="btn btn-primary btn-sm">
                                   <i class="bi bi-pencil"></i>
                                </a>

                                <!-- ELIMINAR -->
                                <a th:href="@{/proveedores/eliminar/{id}(id=${proveedor.id})}"
                                   class="btn btn-danger btn-sm">
                                   <i class="bi bi-trash"></i>
                                </a>

                            </div>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
