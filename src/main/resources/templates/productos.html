<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">
            Volver al Dashboard
        </a>
        <a th:href="@{/productos/historial/stock}" class="btn btn-info mb-3">
        <i class="bi bi-clock-history"></i> Ver historial completo
</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- MENSAJES -->
    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- FORMULARIO CREAR PRODUCTO -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            ➕ Añadir Producto
        </div>

        <div class="card-body">

            <form th:action="@{/productos}" method="post" th:object="${producto}">

                <div class="row">

                    <div class="col-md-4">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Stock</label>
                        <input type="number" class="form-control" th:field="*{stock}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Proveedor</label>
                        <select class="form-select" name="idProveedor" required>
                        <option value="">-- Selecciona proveedor --</option>
                        <option th:each="prov : ${proveedores}"
                                th:value="${prov.id}"
                                th:text="${prov.nombreEmpresa}">
                        </option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-success w-100">
                            Guardar
                        </button>
                    </div>

                </div>

            </form>

        </div>
    </div>

    <!-- TABLA DE PRODUCTOS -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            📦 Inventario de Productos
        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio (€)</th>
                        <th>Stock</th>
                        <th>Proovedor</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="producto : ${productos}">

                        <td th:text="${producto.id}"></td>

                        <td th:text="${producto.nombre}"></td>

                        <td th:text="${producto.precio}"></td>

                        <td th:text="${producto.stock}"></td>

                        <td th:text="${producto.proveedor != null ? producto.proveedor.nombreEmpresa : 'Sin proveedor'}"></td>
  
                        <!-- ALERTA STOCK -->
                        <td>

                            <!-- STOCK BAJO -->
                            <span th:if="${producto.stock <= 5}" class="badge bg-danger">
                                ⚠ Bajo stock
                            </span>

                            <!-- STOCK MEDIO -->
                            <span th:if="${producto.stock > 5 and producto.stock <= 20}" class="badge bg-warning text-dark">
                                ⚠ Stock medio
                            </span>

                            <!-- STOCK ALTO -->
                            <span th:if="${producto.stock > 20}" class="badge bg-success">
                                ✔ Stock OK
                            </span>

                        </td>
                        <td class="d-flex gap-2 align-items-center">
    <form th:action="@{/productos/reducir-stock/{id}(id=${producto.id})}" method="post" class="d-flex gap-2 align-items-center">
        <input type="hidden" name="idProducto" th:value="${producto.id}">
        <input type="number"
               name="cantidad"
               min="1"
               class="form-control form-control-sm"
               style="width: 80px;"
               placeholder="0"
               required>

        <button type="submit" class="btn btn-sm btn-warning">
            Reducir
        </button>


</form>
                    <form th:action="@{/productos/aumentar-stock/{id}(id=${producto.id})}" method="post" class="d-flex gap-2 align-items-center">
        <input type="hidden" name="idProducto" th:value="${producto.id}">
        <input type="number"
               name="cantidad"
               min="1"
               class="form-control form-control-sm"
               style="width: 80px;"
               placeholder="0"
               required>

        <button type="submit" class="btn btn-sm btn-warning">
            Aumentar
        </button>

    </form>
            </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
