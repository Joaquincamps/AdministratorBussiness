<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Historial Servicios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div class="d-flex gap-2">
        <a th:href="@{/servicios}" class="btn btn-outline-light btn-sm">
            Volver a Servicios
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- MENSAJE -->
    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- FILTRO -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            📅 Filtrar por fecha
        </div>

        <div class="card-body">

    <div class="row g-3 align-items-end">

        <!-- FILTRAR -->
        <div class="col-md-4">
            <form th:action="@{/servicios/historial/filtrar}" method="get">
                <label class="form-label">Ver registros por fecha</label>
                <input type="date" name="fecha" class="form-control" required>
                <button class="btn btn-warning w-100 mt-2">
                    Filtrar
                </button>
            </form>
        </div>

        <!-- CALCULAR TOTAL -->
        <div class="col-md-4">
            <form th:action="@{/servicios/historial/total}" method="get">
                <label class="form-label">Calcular total del día</label>
                <input type="date" name="fecha" class="form-control" required>
                <button class="btn btn-success w-100 mt-2">
                    Calcular total
                </button>
            </form>
        </div>

        <!-- RESULTADO -->
        <div class="col-md-4">
            <label class="form-label">Total (€)</label>
            <input type="text"
                   class="form-control"
                   th:value="${total}"
                   placeholder="0 €"
                   readonly>
        </div>

    </div>

</div>
    </div>

    <!-- TOTAL -->
    <div th:if="${totalDia}" class="alert alert-info">
        💰 Total del día: <strong th:text="${totalDia}"></strong> €
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            📋 Servicios Registrados
        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Servicio</th>
                    <th>Precio (€)</th>
                    <th>Fecha</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="reg : ${registros}">
                    <td th:text="${reg.id}"></td>
                    <td th:text="${reg.servicio.tipoServicio}"></td>
                    <td th:text="${reg.precio}"></td>
                    <td th:text="${reg.fecha}"></td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
