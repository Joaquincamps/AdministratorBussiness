<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Enviar mensaje WhatsApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background-color:#f5f6fa;">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">
        <i class="bi bi-speedometer2"></i> Panel Administrador
    </span>

    <div>
        <a th:href="@{/clientes}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Volver a Clientes
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:650px">

        <div class="card-header bg-success text-white text-center">
            <h5 class="mb-0">
                💬 Enviar mensaje por WhatsApp
            </h5>
        </div>

        <div class="card-body p-4">

            <!-- FORM -->
            <form th:action="@{/clientes/enviar/mensaje}" method="post">

                <!-- ID CLIENTE OCULTO -->
                <input type="hidden" name="telefono" th:value="${cliente.telefono}">

                <!-- DATOS CLIENTE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Cliente</label>
                    <input type="text" class="form-control"
                           th:value="${cliente.nombre}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Teléfono</label>
                    <input type="text" class="form-control"
                           th:value="${cliente.telefono}"
                           readonly>
                </div>

                <!-- MENSAJE -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Mensaje</label>
                    <textarea class="form-control"
                              name="mensaje"
                              rows="4"
                              placeholder="Escribe aquí el mensaje para el cliente..."
                              required></textarea>
                </div>

                <!-- BOTONES -->
                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-send"></i> Enviar mensaje
                    </button>

                    <a th:href="@{/clientes}" class="btn btn-secondary w-100">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
