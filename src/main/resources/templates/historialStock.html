<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Historial de Movimientos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Historial de Stock</span>

    <div>
        <a th:href="@{/productos}" class="btn btn-outline-light btn-sm">
            Volver a productos
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- MENSAJE -->
    <div th:if="${mensaje}" class="alert alert-success">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- TARJETA -->
    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            📊 Movimientos de Stock
        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Tipo</th>
                        <th>Cantidad</th>
                        <th>Stock Resultante</th>
                        <th>Fecha</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="mov : ${historial}">

                        <td th:text="${mov.id}"></td>

                        <td th:text="${mov.producto.nombre}"></td>

                        <!-- TIPO -->
                        <td>
                            <span th:if="${mov.operacion.name() == 'SALIDA'}" class="badge bg-danger">
                                Salida
                            </span>

                            <span th:if="${mov.operacion.name() == 'ENTRADA'}" class="badge bg-success">
                                Entrada
                            </span>
                        </td>

                        <!-- CANTIDAD -->
                        <td th:text="${mov.cantidad}"></td>

                        <!-- STOCK FINAL -->
                        <td th:text="${mov.stockFinal}"></td>

                        <!-- FECHA -->
                        <td th:text="${#temporals.format(mov.fecha, 'dd/MM/yyyy HH:mm')}"></td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
