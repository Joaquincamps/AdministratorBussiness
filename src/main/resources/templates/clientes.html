<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/clientes.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>
    <div>
        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Volver al Dashboard</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- TITULO Y BOTON AÑADIR CLIENTE -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Clientes</h2>
        <a th:href="@{/clientes/nuevo}" class="btn btn-primary">Añadir Cliente</a>
    </div>

    <!-- IMPORTAR CSV -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Importar clientes mediante CSV</div>
        <div class="card-body">
            <form th:action="@{/clientes/importar}" method="post" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-8">
                        <input type="file" class="form-control" name="file" accept=".csv" required>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-success w-100">Importar CSV</button>
                    </div>
                </div>
            </form>
            <small class="text-muted mt-2 d-block">El archivo CSV debe contener: nombre, email, teléfono, etc.</small>
        </div>
    </div>

    <!-- TABLA DE CLIENTES -->
    <div class="card">
        <div class="card-header bg-dark text-white">Listado de Clientes</div>
        <div class="card-body">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nombre}"></td>
                        <td th:text="${cliente.email}"></td>
                        <td th:text="${cliente.telefono}"></td>
                        <td>
                            <a th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                            <a th:href="@{/clientes/llamar/{id}(id=${cliente.id})}" class="btn btn-info btn-sm">Llamar</a>
                            <!-- Botón WhatsApp -->
                            <button type="button" class="btn btn-success btn-sm" data-bs-toggle="modal" th:data-bs-target="'#whatsappModal' + ${cliente.id}">
                                WhatsApp
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL WHATSAPP -->
<div th:each="cliente : ${clientes}" th:id="'whatsappModal' + ${cliente.id}" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Enviar WhatsApp a <span th:text="${cliente.nombre}"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/clientes/whatsapp/enviar}" method="post">
                    <input type="hidden" th:name="id" th:value="${cliente.id}">
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" name="mensaje" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Enviar WhatsApp</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/clientes.js}"></script>
</body>
</html>
