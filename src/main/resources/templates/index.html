<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="container mt-5">
    <div class="card card-admin mx-auto" style="max-width: 400px;">
      <div class="card-body">
        <h3 class="titulo-admin text-center mb-4">Iniciar Sesión</h3>

        <!-- Mensajes de error -->
        <div th:if="${mensajeError}" class="alert alert-danger">
          <span th:text="${mensajeError}"></span>
        </div>
        <div th:if="${mensajeExito}" class="alert alert-success">
          <span th:text="${mensajeExito}"></span>
        </div>

        <!-- Formulario Login -->
        <form th:action="@{/admin/login}" th:object="${loginUsuario}" method="post">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" placeholder="Introduce tu nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="Introduce tu contraseña" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Iniciar Sesión</button>
        </form>

        <!-- Enlace a registro -->
        <div class="text-center mt-3">
          <span>¿No tienes cuenta? </span>
          <a href="/registro" class="btn btn-link">Créala aquí</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
