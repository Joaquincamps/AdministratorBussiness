<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Enviar Email</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div>
        <a th:href="@{/proveedores}" class="btn btn-outline-light btn-sm">
            Volver a proveedores
        </a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow-sm mx-auto" style="max-width: 700px;">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">📧 Enviar correo al proveedor</h5>
        </div>

        <div class="card-body">

            <!-- FORMULARIO -->
            <form th:action="@{/proveedores/send-email}" method="post" th:object="${correo}">
                <!-- DESTINATARIO -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Destinatario</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{destinatario}"
                           placeholder="correo@empresa.com"
                           required>
                </div>

                <!-- ASUNTO -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Asunto</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{asunto}"
                           placeholder="Asunto del mensaje"
                           required>
                </div>

                <!-- MENSAJE -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Mensaje</label>

                    <textarea class="form-control"
                              th:field="*{mensaje}"
                              rows="6"
                              placeholder="Escribe aquí el mensaje para el proveedor..."
                              required
                              th:text="${mensaje}">  
                            </textarea>
                </div>

                <!-- BOTONES -->
                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-send"></i> Enviar correo
                    </button>

                    <a th:href="@{/proveedores}" class="btn btn-secondary w-100">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
