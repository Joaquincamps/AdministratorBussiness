<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Proveedor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>

    <div>
        <a th:href="@{/proveedores}" class="btn btn-outline-light btn-sm">
            Volver a Proveedores
        </a>
    </div>
</nav>


<div class="container mt-4">

    <div class="card mx-auto" style="max-width:600px;">

        <div class="card-header bg-warning text-dark">
            Editar Proveedor
        </div>

        <div class="card-body">

            <form th:action="@{/proveedores/editar/{id}(id=${proveedorid})}" th:object="${proveedor}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label">Nombre Empresa</label>
                    <input type="text" class="form-control" th:field="*{nombreEmpresa}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contacto</label>
                    <input type="text" class="form-control" th:field="*{personaContacto}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefono</label>
                    <input type="text" class="form-control" th:field="*{telefono}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control" th:field="*{email}">
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Guardar Cambios
                </button>

            </form>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
