<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Trabajador</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/css/trabajadores.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Panel Administrador</span>
    <div>
        <a th:href="@{/trabajadores}" class="btn btn-outline-light btn-sm">Volver a Trabajadores</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            Crear Nuevo Trabajador
        </div>
        <div class="card-body">
            <!-- Aquí va tu formulario, tú agregas los campos -->
            <form th:action="@{/trabajadores/nuevo}" method="post" enctype="multipart/form-data" th:object="${trabajador}">
 <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" th:field="*{nombre}" placeholder="Nombre">
    </div>

    <div class="mb-3">
      <label class="form-label">Apellido</label>
      <input type="text" class="form-control" th:field="*{apellido}" placeholder="Apellido">
    </div>                
     <div class="mb-3">
      <label class="form-label">Puesto</label>
      <input type="text" class="form-control" th:field="*{puesto}" placeholder="Puesto">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="text" class="form-control" th:field="*{email}" placeholder="Email">
    </div>
     <div class="mb-3">
      <label class="form-label">Salario</label>
      <input type="number" class="form-control" th:field="*{salario}" placeholder="Salario">
    </div>

    <div class="mb-3">
      <label class="form-label">Hora Entrada</label>
      <input type="text" class="form-control" th:field="*{horaEntrada}" placeholder="Hora de Entrada">
    </div>
     <div class="mb-3">
      <label class="form-label">Hora Salida</label>
      <input type="text" class="form-control" th:field="*{horaSalida}" placeholder="Hora de Salida">
    </div>
    <div class="mb-3">
      <label class="form-label">Activo</label>
      <input type="text" class="form-control" th:field="*{activo}" placeholder="Activo">
    </div>
     <div class="mb-3">
      <label class="form-label">De Vacaciones</label>
      <input type="text" class="form-control" th:field="*{deVacaciones}" placeholder="De Vacaciones">
    </div>

    <div class="mb-3">
      <label class="form-label">De Libranza</label>
      <input type="text" class="form-control" th:field="*{deLibranza}" placeholder="De Libranza">
    </div>
    <button type="submit" class="btn btn-success w-100 mt-3">Guardar Trabajador</button>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
