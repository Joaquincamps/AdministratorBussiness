<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/admin.css" />
    <title>Registro Administrador</title>
  </head>
  <body>
    <div class="card card-admin">
      <h3 class="titulo-admin">Registrar Administrador</h3>

      <form
        th:action="@{/admin/registrar}"
        th:object="${administrador}"
        method="post"
      >
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            th:field="*{nombre}"
            placeholder="Introduce tu nombre"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            class="form-control"
            th:field="*{password}"
            placeholder="Introduce una contraseña"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Repite la contraseña"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-admin">
          Crear Administrador
        </button>
        <a th:href="@{/login}" class="btn btn-secondary btn-admin">Iniciar Sesión</a>
      </form>
       <div th:if="${mensajeError}" class="alert alert-danger">
      <span th:text="${mensajeError}"></span>
    </div>
    <div th:if="${mensajeExito}" class="alert alert-success">
      <span th:text="${mensajeExito}"></span>
    </div>
    </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src=".js/admin.js"></script>
  </body>
</html>
